<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SADAME@WIRED</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- SCREEN 1: Boot Sequence -->
  <div id="screen1" class="screen active">
    <div id="bg-image" class="bg-image"></div>
    <div class="overlay"></div>
    <div id="boot-text" class="boot-text"></div>
  </div>

  <!-- SCREEN 2: Terminal Hub -->
  <div id="screen2" class="screen">
    <div class="bg-image"></div>
    <div class="overlay"></div>
    <div class="scanlines"></div>
    <div class="terminal-window">
      <div class="terminal-titlebar">
        <span class="dot dot-red"></span>
        <span class="dot dot-yellow"></span>
        <span class="dot dot-green"></span>
        <span class="terminal-title">SADAME@WIRED:~</span>
      </div>
      <div class="terminal-body">
        <div id="terminal-output"></div>
        <div id="input-line" class="terminal-input-line">
          <span class="prompt">SADAME@WIRED:~$ </span>
          <input type="text" id="terminal-input" spellcheck="false" autocomplete="off" />
        </div>
      </div>
    </div>
    <!-- Music Panel -->
    <div id="music-panel">
      <div class="music-titlebar">
        <span class="dot dot-red music-dot" onclick="toggleMusicPanel()" title="Close">&#10005;</span>
        <span class="dot dot-yellow music-dot" onclick="toggleMusicMinimize()" title="Minimize">&#8722;</span>
        <span class="dot dot-green music-dot" onclick="expandMusicPanel()" title="Maximize">&#43;</span>
        <div class="music-title-wrap">
          <span class="music-title-mini">SADAME@WIRED:~/music</span>
        </div>
      </div>
      <div class="music-content">
        <div id="embed-iframe">
          <iframe
            src="https://open.spotify.com/embed/playlist/4MWZmsObrlhg0dBGmSu1b6?utm_source=generator"
            allowfullscreen
            allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
            loading="lazy">
          </iframe>
        </div>
        <div class="music-buttons">
          <button type="button" class="music-btn" aria-label="Toggle playlist view" onclick="toggleMusicPlaylist()">[playlist]</button>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
